<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Salvage 4.4 – Calcul CMAT</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #f5f5f5;
      background: #050505 url("background.jpg") no-repeat center center fixed;
      background-size: cover;
    }
    .overlay {
      background: radial-gradient(circle at top, rgba(0,0,0,0.75), rgba(0,0,0,0.95));
      min-height: 100vh;
      padding: 30px 10px 40px;
    }
    .container {
      max-width: 1150px;
      margin: 0 auto;
      border: 2px solid #ffb000;
      border-radius: 10px;
      padding: 25px 30px 30px;
      background: rgba(5,5,5,0.9);
    }
    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 15px;
      color: #ffb000;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .sub { text-align:center;color:#ffcc66;font-size:13px;margin-bottom:15px;}

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 26px;
    }
    .panel {
      border: 1px solid #ffb000;
      border-radius: 8px;
      padding: 18px;
      background: #111;
    }
    label { margin-top: 10px; display:block; font-weight:600; }
    input {
      width: 100%; padding: 8px; margin-top:4px;
      border: 2px solid #ffb000; border-radius: 6px;
      background:#222; color:white; font-size:16px;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
    input[type=number] { -moz-appearance:textfield; }

    .result-block {
      background:#151515; padding:12px; margin-bottom:14px;
      border-radius:8px; border:1px solid #333;
    }
    .result-head { font-weight:600; color:#ffe08a; margin-bottom:8px;}
    .decision { margin-top:8px;padding:8px;border-radius:6px;font-weight:600;}
    .decision.good { background:#082d12;border-left:4px solid #00ff66;}
    .decision.bad  { background:#3a0707;border-left:4px solid #ff4444;}
  </style>
</head>

<body>
<div class="overlay">
<div class="container">
  <h1>SALVAGE 4.4 – CALCUL CMAT</h1>
  <div class="sub">Conversion automatique Construction Salvage → Construction Materials</div>

  <div class="grid">

    <!-- ==================== COLONNE GAUCHE ==================== -->
    <div class="panel">

      <label>Prix Construction Salvage (aUEC / SCU)</label>
      <input id="prixSalvage" type="number" value="1500">

      <label>Prix Construction Materials (aUEC / SCU)</label>
      <input id="prixCmat" type="number" value="3000">

      <label>SCU Salvage – Salvation / Vulture / Fortune (rendement 30%)</label>
      <input id="scuLight" type="number" value="0">

      <label>SCU Salvage – Reclaimer (rendement 15%)</label>
      <input id="scuReclaimer" type="number" value="0">

    </div>

    <!-- ==================== COLONNE DROITE ==================== -->
    <div class="panel">

      <div class="result-block">
        <div class="result-head">Salvation / Vulture / Fortune</div>
        <div id="lightValues"></div>
        <div id="lightDecision" class="decision"></div>
      </div>

      <div class="result-block">
        <div class="result-head">Reclaimer</div>
        <div id="recValues"></div>
        <div id="recDecision" class="decision"></div>
      </div>

    </div>
  </div>
</div>
</div>

<script>
/* === CONSTANTES === */
const REND_LIGHT = 0.30;
const REND_RECLAIMER = 0.15;

/* === INPUTS === */
const prixSalvageInput = document.getElementById("prixSalvage");
const prixCmatInput = document.getElementById("prixCmat");
const scuLightInput = document.getElementById("scuLight");
const scuRecInput = document.getElementById("scuReclaimer");

/* === OUTPUTS === */
const lightValues = document.getElementById("lightValues");
const recValues = document.getElementById("recValues");
const lightDecision = document.getElementById("lightDecision");
const recDecision = document.getElementById("recDecision");

/* === FORMATTER === */
function f(v){ return Number(v).toLocaleString("fr-FR"); }

/* === CALCUL === */
function recalc() {
  const ps = Number(prixSalvageInput.value)||0;
  const pc = Number(prixCmatInput.value)||0;
  const sl = Number(scuLightInput.value)||0;
  const sr = Number(scuRecInput.value)||0;

  /* ===== LIGHT (30%) ===== */
  const lightBrut = sl * ps;
  const lightRafScu = sl * REND_LIGHT;
  const lightRafVal = lightRafScu * pc;

  lightValues.textContent =
    `SCU Salvage : ${f(sl)}\n` +
    `CMAT après raffinage : ${f(lightRafScu)} SCU\n\n` +
    `Valeur brute : ${f(lightBrut)} aUEC\n` +
    `Valeur raffinée : ${f(lightRafVal)} aUEC`;

  if (lightRafVal > lightBrut){
    lightDecision.className="decision good";
    lightDecision.textContent="✔ Raffiner est plus rentable";
  } else {
    lightDecision.className="decision bad";
    lightDecision.textContent="✘ Mieux vaut vendre BRUT";
  }

  /* ===== RECLAIMER (15%) ===== */
  const recBrut = sr * ps;
  const recRafScu = sr * REND_RECLAIMER;
  const recRafVal = recRafScu * pc;

  recValues.textContent =
    `SCU Salvage : ${f(sr)}\n` +
    `CMAT après raffinage : ${f(recRafScu)} SCU\n\n` +
    `Valeur brute : ${f(recBrut)} aUEC\n` +
    `Valeur raffinée : ${f(recRafVal)} aUEC`;

  if (recRafVal > recBrut){
    recDecision.className="decision good";
    recDecision.textContent="✔ Raffiner est plus rentable";
  } else {
    recDecision.className="decision bad";
    recDecision.textContent="✘ Mieux vaut vendre BRUT";
  }
}

/* === UPDATE AUTOMATIQUE === */
[prixSalvageInput, prixCmatInput, scuLightInput, scuRecInput]
  .forEach(e => e.addEventListener("input", recalc));

recalc();

/* === LIEN VERS WORKER (décommenter quand stable) ===
async function fetchPrices() {
  const res = await fetch("https://salvage-uex-proxy.yoyoastico74.workers.dev/");
  const data = await res.json();
  prixSalvageInput.value = data.salvagePrice;
  prixCmatInput.value = data.cmatPrice;
  recalc();
}
fetchPrices();
*/
</script>
</body>
</html>
