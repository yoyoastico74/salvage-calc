  <style>
    /* ---------- GLOBAL ---------- */
    html, body {
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #f5f5f5;
      background: #050505 url("background.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: radial-gradient(circle at top, rgba(0,0,0,0.75), rgba(0,0,0,0.95));
      min-height: 100vh;
      padding: 20px 10px 25px;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      border: 2px solid #ffb000;
      border-radius: 10px;
      padding: 16px 20px 20px;
      background: rgba(5,5,5,0.92);
      box-shadow: 0 0 24px rgba(0,0,0,0.7);
    }

    h1 {
      margin: 0 0 16px;
      text-align: center;
      font-size: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffb000;
    }

    .sub {
      text-align: center;
      font-size: 13px;
      color: #ffcc66;
      margin-bottom: 16px;
    }

    /* GRID PRINCIPALE */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* PANELS */
    .panel {
      border-radius: 10px;
      border: 1px solid #ffb000;
      background: linear-gradient(160deg, #1a1a1a, #0b0b0b);
      padding: 12px 12px 16px;
    }

    .panel-title {
      font-size: 18px;
      color: #ffb000;
      margin-bottom: 8px;
      font-weight: 600;
      text-shadow: 0 0 4px rgba(255,176,0,0.4);
    }

    /* INPUTS */
    label {
      display: block;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .hint {
      font-size: 11px;
      color: #ffdd88;
      margin-top: 2px;
    }

    input[type="number"] {
      width: 100%;
      margin-top: 4px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 2px solid #ffb000;
      background: #222;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: #ff8000;
      box-shadow: 0 0 0 2px #ff8000;
    }

    /* Enlever les flèches sur TOUS les inputs number */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    /* TAGS */
    .tag-row {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      font-size: 11px;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #ffb000;
      background: #221600;
      color: #ffd766;
    }

    .tag.red {
      border-color: #ff4444;
      background: #3a0000;
      color: #ffaaaa;
    }

    .small-note {
      margin-top: 7px;
      font-size: 11px;
      color: #bbbbbb;
    }

    .api-status {
      margin-top: 8px;
      font-size: 11px;
      color: #ffdd88;
    }
    .api-status.error {
      color: #ff9090;
    }

    /* PANEL GRAPHIQUE */
    .graph-panel {
      margin-bottom: 14px;
      padding: 12px 12px 16px;
      border-radius: 10px;
      border: 1px solid #ffb000;
      background: linear-gradient(160deg, #1a1a1a, #0b0b0b);
    }

    .graph-title {
      font-size: 16px;
      font-weight: 600;
      color: #ffb000;
      margin-bottom: 6px;
    }

    #graphMessage {
      color: #ffaa88;
      font-size: 12px;
      margin-top: 4px;
    }

    /* RÉSULTATS */
    .result-block {
      background: #151515;
      border-radius: 8px;
      border: 1px solid #444;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .result-head {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #ffe08a;
    }
