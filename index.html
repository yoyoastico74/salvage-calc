<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Salvage 4.4 – Calcul CMAT</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #f2f2f2;
        background-color: #0e0e0e;
    }
    .container {
        width: 90%;
        max-width: 1200px;
        margin: auto;
        padding: 20px;
    }
    input {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
        margin-bottom: 12px;
        border-radius: 4px;
        border: 1px solid #555;
        background: #1a1a1a;
        color: #fff;
        font-size: 16px;
    }
    input[readonly] {
        background: #222 !important;
        color: #aaa;
        cursor: not-allowed;
    }
    .block {
        border: 1px solid #d58d00;
        border-radius: 6px;
        padding: 15px;
        margin-top: 20px;
        background: rgba(20,20,20,0.7);
    }
    .refineGood {
        border-left: 6px solid #44c522;
        padding-left: 10px;
        margin-top: 10px;
    }
    .refineBad {
        border-left: 6px solid #cc2020;
        padding-left: 10px;
        margin-top: 10px;
    }
</style>
</head>

<body>
<div class="container">

<h1>🔧 Salvage 4.4 – Calcul CMAT</h1>

<div class="block">
    <h2>Entrées (auto & manuel)</h2>

    <!-- Prix automatiques UEX -->
    <label>Prix *Construction Salvage* (aUEC / SCU)</label>
    <input id="priceCS" type="number" readonly>

    <label>Prix *Construction Material* brut (aUEC / SCU)</label>
    <input id="priceBrut" type="number" readonly>

    <label>Prix *Construction Material* raffiné (aUEC / SCU)</label>
    <input id="priceRaf" type="number" readonly>

    <!-- SCU entrée -->
    <label>SCU Salvage – Salvation / Vulture / Fortune</label>
    <input id="scuLight" type="number" value="0">

    <label>SCU Salvage – Reclaimer</label>
    <input id="scuHeavy" type="number" value="0">
</div>

<div class="block">
    <h2>Résultats</h2>

    <pre id="result"></pre>
    <div id="refineHint"></div>
</div>

</div>

<!-- SCRIPT -->
<script>
const WORKER_URL = "https://salvage-uex-proxy.yoyoastico74.workers.dev";

// Récupère les prix UEX automatiquement
async function loadPrices() {
    try {
        const res = await fetch(WORKER_URL);
        const data = await res.json();

        if (!data || data.error) throw new Error("Worker API error");

        // Auto-remplissage des prix
        document.getElementById("priceBrut").value = data.cmat_brut;
        document.getElementById("priceRaf").value = data.cmat_raf;
        document.getElementById("priceCS").value = data.csalv;
    }
    catch (e) {
        console.log(e);
        document.getElementById("priceBrut").value = 0;
        document.getElementById("priceRaf").value = 0;
    }
}

// Calculs automatiques
function compute() {
    const brut = Number(document.getElementById("priceBrut").value);
    const raf = Number(document.getElementById("priceRaf").value);
    const light = Number(document.getElementById("scuLight").value);
    const heavy = Number(document.getElementById("scuHeavy").value);

    const result = document.getElementById("result");
    const hint = document.getElementById("refineHint");

    const valBrut = light * brut;
    const valRaf = (light * 0.30) * raf;

    result.textContent =
        `Valeur brute : ${valBrut.toLocaleString()} aUEC\n` +
        `Valeur raffinée : ${valRaf.toLocaleString()} aUEC`;

    if (valRaf > valBrut) {
        hint.innerHTML = `<div class="refineGood">✔ Raffiner est rentable : +${(valRaf-valBrut).toLocaleString()} aUEC</div>`;
    } else {
        hint.innerHTML = `<div class="refineBad">✘ Vendre brut est meilleur : +${(valBrut-valRaf).toLocaleString()} aUEC</div>`;
    }
}

// Réagit à tout changement
document.querySelectorAll("input").forEach(i =>
    i.addEventListener("input", compute)
);

loadPrices().then(compute);
</script>

</body>
</html>
