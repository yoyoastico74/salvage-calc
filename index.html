<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Salvage 4.4 – Calcul CMAT</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        color: #eee;
        background: #111 url('background.jpg') no-repeat center center fixed;
        background-size: cover;
    }

    .container {
        padding: 30px;
        backdrop-filter: blur(6px);
        background: rgba(0,0,0,0.65);
        max-width: 1100px;
        margin: 50px auto;
        border: 2px solid #FFB000;
        border-radius: 10px;
    }

    h1 {
        color: #FFB000;
        text-align: center;
        font-size: 32px;
        margin-bottom: 25px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    label {
        display: block;
        margin-top: 12px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 2px solid #FFB000;
        border-radius: 6px;
        background: #222;
        color: #fff;
        font-size: 18px;
        outline: none;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
    }

    .box {
        padding: 20px;
        background: rgba(20,20,20,0.8);
        border-radius: 8px;
        border: 1px solid #FFB000;
    }

    .title {
        color: #FFB000;
        font-size: 22px;
        margin-bottom: 10px;
        font-weight: bold;
    }

    .result {
        background: #222;
        padding: 15px;
        margin-top: 10px;
        border-radius: 6px;
        border-left: 4px solid #FF8000;
        font-size: 18px;
        white-space: pre-line;
    }
</style>
</head>
<body>

<div class="container">
    <h1>SALVAGE 4.4 – CALCUL CMAT</h1>

    <div class="grid">

        <!-- LEFT SIDE – INPUTS -->
        <div class="box">
            <div class="title">Entrées</div>

            <label>Prix CMAT brut (aUEC / SCU)</label>
            <input id="prixBrut" type="number" value="4500">

            <label>Prix CMAT raffiné (aUEC / SCU)</label>
            <input id="prixRaffine" type="number" value="9000">

            <label>SCU Construction Salvage (Salvation / Vulture / Fortune)</label>
            <input id="scuLight" type="number" value="160">

            <label>SCU Construction Salvage (Reclaimer)</label>
            <input id="scuReclaimer" type="number" value="320">
        </div>

        <!-- RIGHT SIDE – RESULTS -->
        <div class="box">
            <div class="title">Résultats estimés</div>
            <div id="resultLight" class="result"></div>
            <div id="resultReclaimer" class="result"></div>
        </div>

    </div>

</div>

<script>
// Rendements salvage 4.4
const rendementLight = 0.30;      // Salvation / Vulture / Fortune
const rendementReclaimer = 0.15;  // Reclaimer (grosse perte au compactage)

// Fonction principale de calcul
function recalcul() {
    let prixBrut = Number(prixBrutInput.value);
    let prixRaf = Number(prixRaffineInput.value);
    let scuLight = Number(scuLightInput.value);
    let scuReclaimer = Number(scuReclaimerInput.value);

    // Résultats LIGHT SALVAGE
    let lightBrut = scuLight * prixBrut;
    let lightRaf = (scuLight * rendementLight) * prixRaf;

    // Résultats RECLAIMER
    let recBrut = scuReclaimer * prixBrut;
    let recRaf = (scuReclaimer * rendementReclaimer) * prixRaf;

    resultLight.innerText =
        `Salvation / Vulture / Fortune (30%) :
        
Brut  : ${lightBrut.toLocaleString()} aUEC
Raffiné : ${lightRaf.toLocaleString()} aUEC`;

    resultReclaimer.innerText =
        `Reclaimer (15%) :

Brut  : ${recBrut.toLocaleString()} aUEC
Raffiné : ${recRaf.toLocaleString()} aUEC`;
}

// Bind inputs to auto-update
let prixBrutInput = document.getElementById("prixBrut");
let prixRaffineInput = document.getElementById("prixRaffine");
let scuLightInput = document.getElementById("scuLight");
let scuReclaimerInput = document.getElementById("scuReclaimer");

prixBrutInput.oninput =
prixRaffineInput.oninput =
scuLightInput.oninput =
scuReclaimerInput.oninput = recalcul;

recalcul();

// API READY – prix dynamiques UEX
async function getCmatPriceFromAPI() {
    const key = window.API_KEY; // Chargé depuis un fichier séparé !
  
    const response = await fetch("https://api.uexcorp.space/v2/items_prices", {
        headers: { "Authorization": "Bearer " + key }
    });

    const data = await response.json();

    // IMPORTANT : il faut trouver l’ID exact du CMAT dans la liste UEX
    const cmat = data.find(x => x.name === "Construction Material");

    if (cmat) {
        prixBrutInput.value = cmat.sell_price;
        prixRaffineInput.value = cmat.buy_price;
        recalcul();
    }
}
</script>

</body>
</html>
