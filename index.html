<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Salvage 4.4 – Calcul CMAT</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        color: #eee;
        background: #000 url('./background.jpg') no-repeat center center fixed;
        background-size: cover;
    }

    .container {
        padding: 30px;
        max-width: 1100px;
        margin: 50px auto;
        background: rgba(0,0,0,0.70);
        border: 2px solid #FFB000;
        border-radius: 12px;
        backdrop-filter: blur(4px);
    }

    h1 {
        color: #FFB000;
        text-align: center;
        font-size: 36px;
        margin-bottom: 25px;
        letter-spacing: 2px;
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
        font-size: 18px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 2px solid #FFB000;
        border-radius: 6px;
        background: #222;
        color: #fff;
        font-size: 18px;
        outline: none;
        -moz-appearance: textfield; /* retire +/- Firefox */
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none; /* retire +/- Chrome */
        margin: 0;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
    }

    .box {
        padding: 20px;
        background: rgba(20,20,20,0.85);
        border-radius: 8px;
        border: 1px solid #FFB000;
    }

    .title {
        color: #FFB000;
        font-size: 22px;
        margin-bottom: 10px;
        font-weight: bold;
    }

    .result {
        background: #222;
        padding: 15px;
        margin-top: 12px;
        border-radius: 6px;
        border-left: 4px solid #FF8000;
        font-size: 18px;
        white-space: pre-line;
    }

    .verdict {
        margin-top: 20px;
        padding: 15px;
        background: #111;
        border-left: 6px solid #FFB000;
        border-radius: 6px;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
    }
</style>
</head>
<body>

<div class="container">

    <h1>SALVAGE 4.4 – CALCUL CMAT</h1>

    <div class="grid">

        <!-- INPUTS -->
        <div class="box">
            <div class="title">Entrées</div>

            <label>Prix CMAT brut (aUEC / SCU)</label>
            <input id="prixBrut" type="number" value="4500">

            <label>Prix CMAT raffiné (aUEC / SCU)</label>
            <input id="prixRaffine" type="number" value="9000">

            <label>SCU Construction Salvage (Salvation / Vulture / Fortune)</label>
            <input id="scuLight" type="number" value="160">

            <label>SCU Construction Salvage (Reclaimer)</label>
            <input id="scuReclaimer" type="number" value="320">
        </div>

        <!-- RESULTS -->
        <div class="box">
            <div class="title">Résultats estimés</div>

            <div id="resultLight" class="result"></div>
            <div id="resultReclaimer" class="result"></div>

            <div id="verdict" class="verdict"></div>
        </div>

    </div>

</div>

<script>
/* ----- Rendements fixés 4.4 ----- */
const rendementLight = 0.30;      
const rendementReclaimer = 0.15;

/* ----- Lecture + recalcul ----- */
function recalcul() {
    let prixBrut     = Number(prixBrutInput.value) || 0;
    let prixRaffine  = Number(prixRaffineInput.value) || 0;
    let scuLight     = Number(scuLightInput.value) || 0;
    let scuReclaimer = Number(scuReclaimerInput.value) || 0;

    /* ----- LIGHT SHIPS (Salvation / Vulture / Fortune) ----- */
    let brutLight  = scuLight * prixBrut;
    let rafLight   = (scuLight * rendementLight) * prixRaffine;

    /* ----- RECLAIMER ----- */
    let brutRec = scuReclaimer * prixBrut;
    let rafRec  = (scuReclaimer * rendementReclaimer) * prixRaffine;

    resultLight.innerText =
`Salvation / Vulture / Fortune (30%) :

Brut      : ${brutLight.toLocaleString()} aUEC
Raffiné   : ${rafLight.toLocaleString()} aUEC`;

    resultReclaimer.innerText =
`Reclaimer (15%) :

Brut      : ${brutRec.toLocaleString()} aUEC
Raffiné   : ${rafRec.toLocaleString()} aUEC`;

    /* ----- VERDICT GLOBAL ----- */
    let totalBrut = brutLight + brutRec;
    let totalRaf  = rafLight + rafRec;

    if (totalRaf > totalBrut) {
        verdict.innerHTML = "✔️ Raffiner est PLUS rentable : +" + (totalRaf-totalBrut).toLocaleString() + " aUEC";
        verdict.style.color = "#00FF7F";
    } else if (totalRaf < totalBrut) {
        verdict.innerHTML = "❌ Raffiner est MOINS rentable : -" + (totalBrut-totalRaf).toLocaleString() + " aUEC";
        verdict.style.color = "#FF5555";
    } else {
        verdict.innerHTML = "⚠️ Raffiner = Neutre";
        verdict.style.color = "#FFB000";
    }
}

/* ----- Bind auto-calc ----- */
prixBrutInput      = document.getElementById("prixBrut");
prixRaffineInput   = document.getElementById("prixRaffine");
scuLightInput      = document.getElementById("scuLight");
scuReclaimerInput  = document.getElementById("scuReclaimer");

prixBrutInput.oninput =
prixRaffineInput.oninput =
scuLightInput.oninput =
scuReclaimerInput.oninput = recalcul;

recalcul();

/* ----- API READY -----  
   Ajoute TON fichier api_key.js :
   window.API_KEY = "TA_CLE_ICI";
*/
(async function loadAPI() {
    try {
        if (!window.API_KEY) return;
        let r = await fetch("https://salvage-uex-proxy.<ton-compte>.workers.dev")
            headers: {"Authorization": "Bearer " + window.API_KEY}
        });
        let data = await r.json();
        let cmat = data.find(x => x.name === "Construction Materials");
        if (cmat) {
            prixBrutInput.value = cmat.sell_price;
            prixRaffineInput.value = cmat.buy_price;
            recalcul();
        }
    } catch(e){}
})();
</script>

</body>
</html>
